<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <div id="Calculadora">
            <input type="text" id="pantalla" disabled> <br>
            <button id="ac" class="operacion">AC</button>
            <button id="de" class="operacion">DE</button>
            <button id="." class="operacion">.</button>
            <button id="/" class="operacion">/</button> <br>
            <button id="7">7</button>
            <button id="8">8</button>
            <button id="9">9</button>
            <button id="*" class="operacion">*</button><br>
            <button id="4">4</button>
            <button id="5">5</button>
            <button id="6">6</button>
            <button id="-" class="operacion">-</button><br>
            <button id="1">1</button>
            <button id="2">2</button>
            <button id="3">3</button>
            <button id="+" class="operacion">+</button><br>
            <button id="00">00</button>
            <button id="0">0</button>
            <button id="=" class="operacion_igual">=</button><br>
        </div>
    <script src="script.js"></script>
</body>
</html>
